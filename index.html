<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#FF4D4D"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="YummiGo"/>
  <meta name="description" content="Tu comida favorita, a un toque 🔥 Delivery en Aguascalientes"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>
  <title>YummiGoApp</title>

  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html,body{width:100%;height:100%;overscroll-behavior:none;background:#111}
    body{font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
    #root{width:100%;min-height:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    /* ── Splash ── */
    #splash{
      position:fixed;inset:0;z-index:9999;
      background:linear-gradient(160deg,#1a1a1a 0%,#111 60%,#0d0d0d 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:opacity .6s ease;
    }
    #splash.hide{opacity:0;pointer-events:none}
    #splash .logo{
      width:100px;height:100px;border-radius:30px;
      background:rgba(255,77,77,.15);border:1px solid rgba(255,77,77,.3);
      display:flex;align-items:center;justify-content:center;
      font-size:52px;margin-bottom:20px;
      box-shadow:0 0 60px rgba(255,77,77,.25),0 8px 32px rgba(0,0,0,.5);
      animation:logoIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    #splash .brand{
      font-size:38px;font-weight:900;letter-spacing:-1.5px;margin-bottom:6px;
      animation:fadeUp .5s .15s ease both;
    }
    #splash .brand .y{color:#FF4D4D}
    #splash .brand .g{color:#fff}
    #splash .brand .s{color:rgba(255,255,255,.3);font-size:24px;font-weight:700}
    #splash .tagline{font-size:13px;color:rgba(255,255,255,.45);animation:fadeUp .5s .25s ease both}
    #splash .dots{display:flex;gap:8px;margin-top:48px;animation:fadeUp .5s .4s ease both}
    #splash .dot{
      width:8px;height:8px;border-radius:50%;background:#FF4D4D;
      animation:dot 1.4s ease-in-out infinite;
    }
    #splash .dot:nth-child(2){animation-delay:.2s;background:rgba(255,77,77,.7)}
    #splash .dot:nth-child(3){animation-delay:.4s;background:rgba(255,77,77,.4)}

    /* ── Install banner ── */
    #install-banner{
      display:none;position:fixed;bottom:88px;left:50%;
      transform:translateX(-50%) translateY(20px);
      width:calc(100% - 32px);max-width:400px;
      background:#1a1a1a;border:1px solid rgba(255,77,77,.3);
      border-radius:20px;padding:14px 16px;z-index:8000;
      box-shadow:0 8px 40px rgba(0,0,0,.6);opacity:0;
      transition:all .4s cubic-bezier(.34,1.2,.64,1);
    }
    #install-banner.show{display:flex;flex-direction:column;gap:12px;opacity:1;transform:translateX(-50%) translateY(0)}
    .ib-row{display:flex;align-items:center;gap:12px}
    .ib-icon{width:44px;height:44px;border-radius:13px;background:#FF4D4D;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .ib-info{flex:1}
    .ib-title{font-size:14px;font-weight:800;color:#fff}
    .ib-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
    .ib-close{font-size:18px;cursor:pointer;color:rgba(255,255,255,.4);padding:4px}
    .ib-btn{width:100%;padding:13px;background:#FF4D4D;color:#fff;border:none;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.3px}

    /* ── Loading error ── */
    #load-error{display:none;position:fixed;inset:0;background:#111;color:#fff;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9998}
    #load-error.show{display:flex}

    @keyframes logoIn{from{transform:scale(.5) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    @keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes dot{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>

<div id="splash">
  <div class="logo">🛵</div>
  <div class="brand"><span class="y">Yummi</span><span class="g">Go</span><span class="s">App</span></div>
  <div class="tagline">Tu comida favorita, a un toque 🔥</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<div id="load-error">
  <div style="font-size:48px">😕</div>
  <div style="font-size:18px;font-weight:700">Error al cargar la app</div>
  <div style="font-size:13px;color:rgba(255,255,255,.5);text-align:center;max-width:280px">Verifica tu conexión a internet e intenta recargar</div>
  <button onclick="location.reload()" style="background:#FF4D4D;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px">Recargar</button>
</div>

<div id="install-banner">
  <div class="ib-row">
    <div class="ib-icon">🛵</div>
    <div class="ib-info">
      <div class="ib-title">Instalar YummiGoApp</div>
      <div class="ib-sub">Sin App Store · Gratis · Sin anuncios</div>
    </div>
    <div class="ib-close" onclick="dismissInstall()">✕</div>
  </div>
  <button class="ib-btn" onclick="installPWA()">📲 Instalar en este dispositivo</button>
</div>

<div id="root"></div>

<!-- React 18 + ReactDOM -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Babel standalone — compiles JSX in browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script>
// ── Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('SW ok',r.scope))
      .catch(e=>console.warn('SW fail',e));
  });
}

// ── Install prompt ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  if(!window.matchMedia('(display-mode:standalone)').matches){
    setTimeout(()=>{ const b=document.getElementById('install-banner'); if(b)b.classList.add('show'); },5000);
  }
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; dismissInstall(); });
}
function dismissInstall(){
  const b=document.getElementById('install-banner');
  if(b){ b.style.opacity='0'; b.style.transform='translateX(-50%) translateY(20px)'; setTimeout(()=>b.classList.remove('show'),350); }
}

// ── Splash hide ──
window.__hideSplash=()=>{
  const s=document.getElementById('splash');
  if(s&&!s.classList.contains('hide')){ s.classList.add('hide'); setTimeout(()=>{ if(s.parentNode)s.remove(); },700); }
};

// ── Double-tap zoom prevention ──
let lastTap=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTap<300)e.preventDefault();
  lastTap=now;
},{passive:false});

// ── Pull-to-refresh prevention ──
let startY=0;
document.addEventListener('touchstart',e=>{ startY=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchmove',e=>{
  if(document.scrollingElement.scrollTop===0 && e.touches[0].clientY>startY+10)
    e.preventDefault();
},{passive:false});

// ── Error timeout (if app fails to load in 15s) ──
const errTimer=setTimeout(()=>{
  const r=document.getElementById('root');
  if(!r||r.children.length===0){
    document.getElementById('load-error').classList.add('show');
    window.__hideSplash && window.__hideSplash();
  }
},15000);
window.__appLoaded=()=>clearTimeout(errTimer);
</script>

<!-- ── The App — compiled by Babel in browser ── -->
<script type="text/babel" src="/app.jsx" data-presets="react"></script>

</body>
</html>
